<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost in the Smoke — Bob &amp; Barb's</title>
  <meta name="theme-color" content="#17120d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600&family=Yellowtail&family=Inter:wght@400;500&family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <style>
    :root { --char:#17120d; --brick:#9c3324; --ember:#d4521f; --mustard:#c08a2c; --cream:#f4ece0; }
    * { margin:0; box-sizing:border-box; }
    body {
      min-height:100svh; display:grid; place-items:center; text-align:center; padding:2rem;
      font-family:'Inter',system-ui,sans-serif; color:var(--cream); background:var(--char);
      position:relative; overflow:hidden;
    }
    body::before {
      content:''; position:absolute; inset:0; opacity:0.18;
      background:url('assets/gallery/burntends.jpg') center/cover no-repeat; filter:grayscale(0.3);
    }
    main { position:relative; z-index:1; }
    .script { font-family:'Yellowtail',cursive; font-size:2rem; color:var(--mustard); }
    .code { font-family:'Anton',sans-serif; font-size:clamp(5rem,22vw,11rem); line-height:.85; color:var(--ember); letter-spacing:.02em; }
    h1 { font-family:'Anton',sans-serif; text-transform:uppercase; font-weight:400; font-size:clamp(1.4rem,5vw,2.4rem); letter-spacing:.04em; margin:.4rem 0 1rem; }
    p { color:rgba(244,236,224,.72); max-width:42ch; margin:0 auto 2rem; }
    .call { font-family:'Courier Prime',monospace; margin-bottom:1.6rem; }
    .call a { color:var(--mustard); }
    a.btn {
      display:inline-flex; align-items:center; gap:.5rem; font-family:'Oswald',sans-serif; text-transform:uppercase;
      letter-spacing:.1em; font-size:.86rem; padding:.95rem 1.7rem; border-radius:3px; text-decoration:none; color:#fff;
      background:var(--ember); transition:transform .25s, background .25s;
    }
    a.btn:hover { transform:translateY(-2px); background:#b8430f; }
  </style>
</head>
<body>
  <main>
    <p class="script">Bob &amp; Barb's</p>
    <div class="code">404</div>
    <h1>This one went up in smoke</h1>
    <p>The page you're after isn't on the pit. Let's get you back to the good stuff.</p>
    <p class="call">Call to order: <a href="tel:+16628015181">662-801-5181</a></p>
    <a class="btn" href="/">Back to the Pit</a>
  </main>
</body>
</html>
